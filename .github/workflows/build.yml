name: Build

on:
  push:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra texlive-lang-portuguese

      - name: Build English Resume
        working-directory: resumes/en
        run: pdflatex resume.tex

      - name: Build Portuguese Resume
        working-directory: resumes/pt-br
        run: pdflatex curriculo.tex

      - name: Upload generated PDFs to GitHub Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: |
            resumes/en/resume.pdf
            resumes/pt-br/curriculo.pdf

      - name: Commit generated PDFs back to the repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f resumes/en/resume.pdf resumes/pt-br/curriculo.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "ci: gerar PDFs do currículo automaticamente [skip ci]"
            git push
          fi
